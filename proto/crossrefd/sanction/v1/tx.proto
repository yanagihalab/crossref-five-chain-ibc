syntax = "proto3";
package crossrefd.sanction.v1;
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "crossrefd/sanction/v1/params.proto";
import "crossrefd/sanction/v1/types.proto";
option go_package = "github.com/crossref/crossrefd/x/sanction/types";
service Msg { option (cosmos.msg.v1.service) = true; rpc RegisterAgent(MsgRegisterAgent) returns (MsgRegisterAgentResponse); rpc SubmitRiskReport(MsgSubmitRiskReport) returns (MsgSubmitRiskReportResponse); rpc OpenSanctionCase(MsgOpenSanctionCase) returns (MsgOpenSanctionCaseResponse); rpc SubmitSanctionVote(MsgSubmitSanctionVote) returns (MsgSubmitSanctionVoteResponse); rpc ExecuteSanction(MsgExecuteSanction) returns (MsgExecuteSanctionResponse); rpc RevokeSanction(MsgRevokeSanction) returns (MsgRevokeSanctionResponse); rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse); }
message MsgRegisterAgent { option (cosmos.msg.v1.signer) = "authority"; option (amino.name) = "crossrefd/x/sanction/MsgRegisterAgent"; string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; AgentInfo agent = 2 [(gogoproto.nullable) = false]; }
message MsgRegisterAgentResponse {}
message MsgSubmitRiskReport { option (cosmos.msg.v1.signer) = "submitter"; option (amino.name) = "crossrefd/x/sanction/MsgSubmitRiskReport"; string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; RiskReport report = 2 [(gogoproto.nullable) = false]; }
message MsgSubmitRiskReportResponse { string report_id = 1; }
message MsgOpenSanctionCase { option (cosmos.msg.v1.signer) = "submitter"; option (amino.name) = "crossrefd/x/sanction/MsgOpenSanctionCase"; string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; string case_id = 2; bytes tx_hash = 3; string target_address = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"]; SanctionTargetType target_type = 5; SanctionAction requested_action = 6; repeated string report_ids = 7; string policy_version = 8; }
message MsgOpenSanctionCaseResponse { string case_id = 1; }
message MsgSubmitSanctionVote { option (cosmos.msg.v1.signer) = "submitter"; option (amino.name) = "crossrefd/x/sanction/MsgSubmitSanctionVote"; string submitter = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; SanctionVote vote = 2 [(gogoproto.nullable) = false]; }
message MsgSubmitSanctionVoteResponse { bool approved = 1; bool rejected = 2; }
message MsgExecuteSanction { option (cosmos.msg.v1.signer) = "executor"; option (amino.name) = "crossrefd/x/sanction/MsgExecuteSanction"; string executor = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; string case_id = 2; string result_message = 3; }
message MsgExecuteSanctionResponse { ExecutionRecord record = 1 [(gogoproto.nullable) = false]; }
message MsgRevokeSanction { option (cosmos.msg.v1.signer) = "authority"; option (amino.name) = "crossrefd/x/sanction/MsgRevokeSanction"; string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; string case_id = 2; string reason = 3; }
message MsgRevokeSanctionResponse {}
message MsgUpdateParams { option (cosmos.msg.v1.signer) = "authority"; option (amino.name) = "crossrefd/x/sanction/MsgUpdateParams"; string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"]; Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true]; }
message MsgUpdateParamsResponse {}
