syntax = "proto3";
package crossrefd.sanction.v1;
import "google/api/annotations.proto";
import "gogoproto/gogo.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "crossrefd/sanction/v1/params.proto";
import "crossrefd/sanction/v1/types.proto";
option go_package = "github.com/crossref/crossrefd/x/sanction/types";
service Query { rpc Params(QueryParamsRequest) returns (QueryParamsResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/params"; } rpc Agent(QueryAgentRequest) returns (QueryAgentResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/agents/{agent_id}"; } rpc Agents(QueryAgentsRequest) returns (QueryAgentsResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/agents"; } rpc RiskReport(QueryRiskReportRequest) returns (QueryRiskReportResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/risk_reports/{report_id}"; } rpc SanctionCase(QuerySanctionCaseRequest) returns (QuerySanctionCaseResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/cases/{case_id}"; } rpc SanctionVotes(QuerySanctionVotesRequest) returns (QuerySanctionVotesResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/cases/{case_id}/votes"; } rpc ActiveTxSanction(QueryActiveTxSanctionRequest) returns (QueryActiveTxSanctionResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/tx/{tx_hash}/active"; } rpc FrozenAddress(QueryFrozenAddressRequest) returns (QueryFrozenAddressResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/frozen/{address}"; } rpc ExecutionRecord(QueryExecutionRecordRequest) returns (QueryExecutionRecordResponse) { option (google.api.http).get = "/crossrefd/sanction/v1/executions/{case_id}"; } }
message QueryParamsRequest {}
message QueryParamsResponse { Params params = 1 [(gogoproto.nullable) = false]; }
message QueryAgentRequest { string agent_id = 1; }
message QueryAgentResponse { AgentInfo agent = 1 [(gogoproto.nullable) = false]; }
message QueryAgentsRequest { cosmos.base.query.v1beta1.PageRequest pagination = 1; }
message QueryAgentsResponse { repeated AgentInfo agents = 1 [(gogoproto.nullable) = false]; cosmos.base.query.v1beta1.PageResponse pagination = 2; }
message QueryRiskReportRequest { string report_id = 1; }
message QueryRiskReportResponse { RiskReport report = 1 [(gogoproto.nullable) = false]; }
message QuerySanctionCaseRequest { string case_id = 1; }
message QuerySanctionCaseResponse { SanctionCase sanction_case = 1 [(gogoproto.nullable) = false]; }
message QuerySanctionVotesRequest { string case_id = 1; }
message QuerySanctionVotesResponse { repeated SanctionVote votes = 1 [(gogoproto.nullable) = false]; }
message QueryActiveTxSanctionRequest { string tx_hash = 1; }
message QueryActiveTxSanctionResponse { ActiveSanction sanction = 1 [(gogoproto.nullable) = false]; }
message QueryFrozenAddressRequest { string address = 1; }
message QueryFrozenAddressResponse { FreezeRecord record = 1 [(gogoproto.nullable) = false]; }
message QueryExecutionRecordRequest { string case_id = 1; }
message QueryExecutionRecordResponse { ExecutionRecord record = 1 [(gogoproto.nullable) = false]; }
