services:
  chain-a:
    build:
      context: ..
      dockerfile: docker/crossrefd.Dockerfile
    container_name: crossref-chain-a
    environment:
      CHAIN_ID: crossref-a
      MONIKER: chain-a
      HOME_DIR: /var/crossref
      VALIDATOR_MNEMONIC: "flight theme grace pulp vocal pistol slight assume major blossom upgrade solution picture script behind human whip rule goat raw search cube breeze hundred"
      RELAYER_MNEMONIC: "turtle all pyramid produce tray equip elder border rose risk slight panther grant price smile try fly street carpet wage among hole join suit"
    command: ["/opt/crossref/scripts/start-chain.sh"]
    ports:
      - "26657:26657"
      - "9090:9090"
      - "1317:1317"
    volumes:
      - chain-a-data:/var/crossref
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:26657/status | grep -Eq '\"latest_block_height\":\"[1-9][0-9]*\"'"]
      interval: 5s
      timeout: 3s
      retries: 30

  chain-b:
    build:
