syntax = "proto3";
package crossrefd.sanction.v1;
option go_package = "github.com/crossref/crossrefd/x/sanction/types";
message AgentInfo { string agent_id = 1; string validator_operator = 2; string signer_address = 3; bytes public_key = 4; string llm_endpoint_hash = 5; bool active = 6; }
message RiskReport { string report_id = 1; bytes tx_hash = 2; string from_address = 3; string to_address = 4; string amount = 5; string denom = 6; uint32 risk_score = 7; repeated string categories = 8; string source = 9; uint64 observed_height = 10; uint64 expiry_height = 11; bytes evidence_hash = 12; string submitter = 13; bytes submitter_signature = 14; }
message SanctionCase { string case_id = 1; bytes tx_hash = 2; string target_address = 3; SanctionTargetType target_type = 4; SanctionAction requested_action = 5; CaseStatus status = 6; repeated string report_ids = 7; uint64 opened_height = 8; uint64 voting_deadline_height = 9; uint64 executed_height = 10; string policy_version = 11; bytes decision_hash = 12; }
enum SanctionTargetType { SANCTION_TARGET_TYPE_UNSPECIFIED = 0; SANCTION_TARGET_TYPE_TX = 1; SANCTION_TARGET_TYPE_ADDRESS = 2; }
enum SanctionAction { SANCTION_ACTION_UNSPECIFIED = 0; SANCTION_ACTION_WATCH = 1; SANCTION_ACTION_BLOCK_TX = 2; SANCTION_ACTION_FREEZE_ADDRESS = 3; SANCTION_ACTION_ESCROW_FUNDS = 4; SANCTION_ACTION_REVERT_TRANSFER = 5; }
enum CaseStatus { CASE_STATUS_UNSPECIFIED = 0; CASE_STATUS_PENDING = 1; CASE_STATUS_APPROVED = 2; CASE_STATUS_REJECTED = 3; CASE_STATUS_EXECUTED = 4; CASE_STATUS_REVOKED = 5; CASE_STATUS_EXPIRED = 6; }
message SanctionVote { string case_id = 1; string agent_id = 2; VoteOption option = 3; SanctionAction approved_action = 4; string reason_code = 5; bytes rationale_hash = 6; uint64 signed_height = 7; bytes signature = 8; }
enum VoteOption { VOTE_OPTION_UNSPECIFIED = 0; VOTE_OPTION_APPROVE = 1; VOTE_OPTION_REJECT = 2; VOTE_OPTION_ABSTAIN = 3; }
message ActiveSanction { string case_id = 1; bytes tx_hash = 2; string target_address = 3; SanctionAction action = 4; uint64 activated_height = 5; }
message FreezeRecord { string address = 1; string case_id = 2; uint64 frozen_height = 3; string reason = 4; }
message ExecutionRecord { string case_id = 1; SanctionAction action = 2; bytes tx_hash = 3; string target_address = 4; string executor = 5; uint64 executed_height = 6; string result_code = 7; string result_message = 8; bytes state_change_hash = 9; }
