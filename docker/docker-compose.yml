  relayer:
    image: ghcr.io/informalsystems/hermes:1.10.5
    container_name: crossref-hermes
    user: root
    depends_on:
      chain-a:
        condition: service_healthy
      chain-b:
        condition: service_healthy
      chain-c:
        condition: service_healthy
      chain-d:
        condition: service_healthy
      chain-e:
        condition: service_healthy
    environment:
      RELAYER_MNEMONIC: "turtle all pyramid produce tray equip elder border rose risk slight panther grant price smile try fly street carpet wage among hole join suit"
      HERMES_CONFIG: /root/.hermes/config.toml
    entrypoint: ["/bin/sh", "/opt/crossref/scripts/setup-ibc.sh"]
    volumes:
      - ./hermes/config.toml:/root/.hermes/config.toml:ro
      - ./scripts:/opt/crossref/scripts:ro
      - hermes-keys:/root/.hermes/keys

volumes:
  chain-a-data:
  chain-b-data:
  chain-c-data:
  chain-d-data:
  chain-e-data:
  hermes-keys:
